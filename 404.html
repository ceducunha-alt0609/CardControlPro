<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurum Pro</title>
  <script>
    // GitHub Pages SPA redirect
    // Redireciona qualquer rota 404 de volta ao index.html
    // mantendo o caminho como query string para o index processar
    var segmentCount = 0;
    var location = window.location;
    var base = location.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/';
    var path = location.pathname.slice(base.length).replace(/&/g, '~and~');
    var search = location.search.slice(1).replace(/&/g, '~and~');
    var hash = location.hash.slice(1);
    if (path || search || hash) {
      location.replace(
        base + '?p=/' + [path, search, hash].filter(Boolean).join('~and~')
      );
    } else {
      location.replace(base);
    }
  </script>
</head>
<body>
  <style>
    body { margin:0; background:#0d1829; display:flex; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; }
    .msg { color:#d4af37; text-align:center; }
    .spinner { width:40px; height:40px; border:3px solid #1a2f52; border-top-color:#d4af37; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg) } }
  </style>
  <div class="msg">
    <div class="spinner"></div>
    <p>Carregando Aurum Pro…</p>
  </div>
</body>
</html>
